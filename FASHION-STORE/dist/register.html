<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Velora Register</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme:{
extend:{
colors:{
gold:'#C8A96B',
beige:'#F8F5EF',
dark:'#1E1A17'
}
}
}
}
</script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

body{
overflow:hidden;
}

.circle1{
position:absolute;
width:350px;
height:350px;
background:#C8A96B20;
border-radius:50%;
top:-120px;
left:-120px;
animation:float 6s infinite ease-in-out;
}

.circle2{
position:absolute;
width:280px;
height:280px;
background:#C8A96B15;
border-radius:50%;
bottom:-100px;
right:-100px;
animation:float2 8s infinite ease-in-out;
}

@keyframes float{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(20px);
}
}

@keyframes float2{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-20px);
}
}

.fadeup{
animation:fadeup .8s ease;
}

@keyframes fadeup{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body class="bg-beige min-h-screen flex justify-center items-center relative">

<div class="circle1"></div>
<div class="circle2"></div>

<div class="bg-white w-[92%] max-w-md rounded-3xl shadow-xl p-7 z-10 fadeup">

<div class="text-center mb-6">

<h1 class="text-4xl font-serif text-dark">
Velora
</h1>

<p class="text-gray-500 mt-2">
Create Your Account
</p>

</div>

<form id="registerForm">

<div class="mb-4">

<label class="text-sm text-gray-600">
Full Name
</label>

<input
type="text"
id="name"
required
placeholder="Enter full name"
class="w-full mt-2 border rounded-xl p-3 focus:border-gold outline-none">

</div>

<div class="mb-4">

<label class="text-sm text-gray-600">
Email
</label>

<input
type="email"
id="email"
required
placeholder="Enter email"
class="w-full mt-2 border rounded-xl p-3 focus:border-gold outline-none">

</div>

<div class="mb-4">

<label class="text-sm text-gray-600">
Password
</label>

<div class="relative">

<input
type="password"
id="password"
required
placeholder="Create password"
class="w-full mt-2 border rounded-xl p-3 focus:border-gold outline-none">

<i
id="togglePassword"
class="fa-solid fa-eye absolute right-4 top-6 cursor-pointer text-gray-500">
</i>

</div>

<div class="w-full h-2 bg-gray-200 rounded mt-3">

<div
id="strengthBar"
class="h-2 rounded transition-all duration-300">
</div>

</div>

<p id="strengthText"
class="text-xs mt-1 text-gray-500"></p>

</div>

<div class="mb-5">

<label class="text-sm text-gray-600">
Confirm Password
</label>

<input
type="password"
id="confirmPassword"
required
placeholder="Confirm password"
class="w-full mt-2 border rounded-xl p-3 focus:border-gold outline-none">

</div>

<button
type="submit"
class="w-full bg-dark text-white p-3 rounded-xl hover:opacity-90">

Create Account

</button>

</form>

<div class="mt-5 text-center">

<p class="text-gray-500">

Already have an account?

<a href="login.html"
class="text-gold font-semibold">
Login
</a>

</p>

</div>

<div class="mt-6">

<div class="flex items-center gap-3">

<hr class="flex-1">

<span class="text-gray-400 text-sm">
OR SIGNUP WITH
</span>

<hr class="flex-1">

</div>

<div class="grid grid-cols-3 gap-3 mt-5">

<button class="border rounded-xl p-3 hover:bg-gray-50">
<i class="fab fa-google text-xl"></i>
</button>

<button class="border rounded-xl p-3 hover:bg-gray-50">
<i class="fab fa-apple text-xl"></i>
</button>

<button class="border rounded-xl p-3 hover:bg-gray-50">
<i class="fab fa-instagram text-xl"></i>
</button>

</div>

</div>

</div>

<script>

$(document).ready(function(){

$("#togglePassword").click(function(){

let input=$("#password");

if(input.attr("type")==="password"){

input.attr("type","text");

$(this)
.removeClass("fa-eye")
.addClass("fa-eye-slash");

}else{

input.attr("type","password");

$(this)
.removeClass("fa-eye-slash")
.addClass("fa-eye");

}

});

$("#password").keyup(function(){

let password=$(this).val();
let strength=0;

if(password.length >= 8) strength++;
if(/[A-Z]/.test(password)) strength++;
if(/[0-9]/.test(password)) strength++;
if(/[!@#$%^&*]/.test(password)) strength++;

if(strength==1){

$("#strengthBar")
.css("width","25%")
.css("background","red");

$("#strengthText").text("Weak Password");

}
else if(strength==2){

$("#strengthBar")
.css("width","50%")
.css("background","orange");

$("#strengthText").text("Medium Password");

}
else if(strength==3){

$("#strengthBar")
.css("width","75%")
.css("background","#C8A96B");

$("#strengthText").text("Strong Password");

}
else if(strength==4){

$("#strengthBar")
.css("width","100%")
.css("background","green");

$("#strengthText").text("Very Strong Password");

}

});

$("#registerForm").submit(function(e){

e.preventDefault();

let name=$("#name").val();
let email=$("#email").val();
let password=$("#password").val();
let confirm=$("#confirmPassword").val();

if(password!==confirm){

alert("Passwords do not match");
return;

}

let user={

name:name,
email:email,
password:password

};

localStorage.setItem(
"user",
JSON.stringify(user)
);

alert("Registration Successful");

window.location.href="login.html";

});

});

</script>

</body>
</html>
