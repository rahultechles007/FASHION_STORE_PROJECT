<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velvet Fashion</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
    --black:#1A1A1A;
    --cream:#F5EFE6;
    --brown:#8B6B4A;
    --dark-brown:#5C4033;
    --white:#FFFFFF;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background:var(--cream);
    color:var(--black);
    min-height:100vh;
}

.container{
    max-width:420px;
    margin:auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:24px;
    text-align:center;
}

/* Header */

.logo-section{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:30px;
}

.logo{
    width:50px;
    height:50px;
    border-radius:12px;
    background:var(--brown);
    display:flex;
    justify-content:center;
    align-items:center;
    color:var(--white);
    font-size:22px;
    font-weight:bold;
}

.brand-name{
    font-family:'Playfair Display', serif;
    font-size:1.8rem;
    color:var(--dark-brown);
}

/* Hero */

.hero-card{
    width:100%;
    background:var(--white);
    border-radius:30px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.hero-image{
    width:100%;
    height:340px;
    border-radius:24px;
    overflow:hidden;
}

.hero-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.hero-title{
    margin-top:24px;
    font-family:'Playfair Display', serif;
    font-size:2rem;
    color:var(--black);
}

.hero-text{
    margin-top:12px;
    color:#666;
    line-height:1.6;
    font-size:0.95rem;
}

/* Button */

.start-btn{
    margin-top:28px;
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:var(--black);
    color:var(--white);
    font-size:1rem;
    font-weight:500;
    cursor:pointer;
    transition:.3s;
}

.start-btn:hover{
    background:var(--brown);
    transform:translateY(-2px);
}

.tagline{
    margin-top:18px;
    color:var(--brown);
    font-size:.85rem;
    letter-spacing:2px;
    text-transform:uppercase;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo-section">
        <div class="logo">V</div>
        <h1 class="brand-name">Velvet</h1>
    </div>

    <div class="hero-card">

        <div class="hero-image">
            <img src="https://images.pexels.com/photos/18457315/pexels-photo-18457315.jpeg"
                 alt="Fashion Model">
        </div>

        <h2 class="hero-title">
            Discover Your Style
        </h2>

        <p class="hero-text">
            Explore premium fashion collections curated for modern elegance.
            Find outfits that define your personality and confidence.
        </p>

        <button class="start-btn" onclick="document.location='index.html'" >
           Get Started
        </button>

        <div class="tagline">
            Luxury • Fashion • Elegance
        </div>

    </div>

</div>

</body>
</html>
